<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MitchCopter</title>
  <link rel="stylesheet" href="style.css">
  
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  
  <div id="game-screen" style="display: none;"></div>

  <div id="controls-panel" style="display: none;">
    <h3>Controls</h3>
    <p>↑ ↓ — Forward / Back</p>
    <p>← → — Turn Left / Right</p>
    <p>A S — Strafe Left / Right</p>
    <p>Q W — Ascend / Descend</p>
  </div>

  <div id="loading-screen">
    <h1>MitchCopter</h1>
    <h3>Drop your .sc2 file to begin</h3>
    <div id="drop-zone">Drop File Here</div>
    <div id="status"></div>
  </div>

  <script type="module" src="app.js"></script>
  <script type="module">

  </script>
</body>
</html>
